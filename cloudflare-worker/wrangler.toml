name = "gemini-proxy"
main = "src/index.js"
compatibility_date = "2024-12-01"

# 环境变量（也可以在 Cloudflare Dashboard 设置）
[vars]
NODE_ENV = "production"
# 在 CF Dashboard → Workers → gemini-proxy → Settings → Variables 设置以下 Secrets：
# UPSTASH_REDIS_REST_URL = https://xxx.upstash.io
# UPSTASH_REDIS_REST_TOKEN = xxx
# API key 由客户端通过 Authorization: Bearer 传入，无需在这里配置

# Workers免费套餐限制：100,000 请求/天
